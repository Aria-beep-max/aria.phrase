<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>常用語工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111; --surface: #1a1a1a; --border: #2a2a2a;
  --text: #e8e8e8; --muted: #666;
  --en: #60b8f0; --zh: #f0c060; --ko: #c060f0;
  --en-bg: #0d2233; --zh-bg: #2a2000; --ko-bg: #1e0d33;
}
html, body { width: 490px; height: 220px; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', 'Malgun Gothic', sans-serif; font-size: 12px; user-select: none; }
.app { display: flex; flex-direction: column; width: 490px; height: 220px; }
.topbar { display: flex; align-items: center; height: 26px; background: #161616; border-bottom: 1px solid var(--border); flex-shrink: 0; padding: 0 10px; gap: 8px; }
.app-title { font-family: monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
.name-wrap { display: flex; align-items: center; gap: 5px; margin-left: auto; }
.name-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.name-input { width: 88px; height: 18px; padding: 0 7px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-size: 11px; outline: none; }
.name-input:focus { border-color: #555; }
.name-input::placeholder { color: #333; }
.folder-row { display: flex; height: 28px; flex-shrink: 0; background: #0d0d0d; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.folder-row::-webkit-scrollbar { display: none; }
.folder-tab { display: flex; align-items: center; gap: 5px; padding: 0 11px; height: 100%; cursor: pointer; font-size: 11px; color: #777; border: none; background: transparent; white-space: nowrap; border-right: 1px solid var(--border); border-bottom: 2px solid transparent; transition: all 0.1s; flex-shrink: 0; margin-bottom: -1px; }
.folder-tab:hover { color: #ccc; background: #161616; }
.folder-tab.active { color: #fff; background: var(--surface); border-bottom-color: var(--tc); }
.folder-tab .ficon { font-size: 12px; }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 5px 6px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; align-content: start; scrollbar-width: thin; scrollbar-color: #2a2a2a transparent; }
.phrase-group { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.group-header { padding: 4px 7px; font-size: 11px; color: #aaa; border-bottom: 1px solid var(--border); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lang-btns { display: flex; }
.lang-btn { flex: 1; display: flex; align-items: center; justify-content: center; height: 26px; border: none; background: transparent; cursor: pointer; font-family: monospace; font-size: 12px; font-weight: 700; border-right: 1px solid var(--border); transition: background 0.1s; }
.lang-btn:last-child { border-right: none; }
.lang-btn.en { color: var(--en); }
.lang-btn.zh { color: var(--zh); }
.lang-btn.ko { color: var(--ko); }
.lang-btn:hover.en, .lang-btn.copied.en { background: var(--en-bg); }
.lang-btn:hover.zh, .lang-btn.copied.zh { background: var(--zh-bg); }
.lang-btn:hover.ko, .lang-btn.copied.ko { background: var(--ko-bg); }
.lang-btn.empty { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
.toast { position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%) translateY(8px); background: #c8f060; color: #0f0f0f; font-family: monospace; font-size: 10px; font-weight: 700; padding: 3px 14px; border-radius: 3px; opacity: 0; transition: all 0.12s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

const LANGS = ['en','zh','ko'];
const LANG_LABEL = { en:'EN', zh:'中', ko:'韓' };
let activeSection = 'greeting';

function getName() { return document.getElementById('name-input').value.trim(); }

function copyText(text, btn) {
  const name = getName();
  const final = name ? text.trimEnd() + ' ' + name : text;
  const ok = () => {
    btn.classList.add('copied');
    showToast();
    setTimeout(() => btn.classList.remove('copied'), 800);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(final).then(ok).catch(() => fallback(final, ok));
  } else { fallback(final, ok); }
}

function fallback(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e){}
  document.body.removeChild(ta);
}

function setSection(id) {
  activeSection = id;
  document.querySelectorAll('.folder-tab').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  renderContent();
}

function renderFolders() {
  const el = document.getElementById('folder-row');
  el.innerHTML = data.sections.map((s, i) =>
    `<button class="folder-tab${s.id===activeSection?' active':''}" data-id="${s.id}" style="--tc:${COLORS[i]}">
      <span class="ficon">${s.icon}</span>${s.label}
    </button>`
  ).join('');
  el.querySelectorAll('.folder-tab').forEach(b => b.addEventListener('click', () => setSection(b.dataset.id)));
}

function renderContent() {
  const sec = data.sections.find(s => s.id === activeSection);
  const el = document.getElementById('content');
  el.innerHTML = sec.groups.map(g => {
    const btns = LANGS.map(lang => {
      const text = data.phrases[g.key + '_' + lang] || '';
      const empty = !text;
      return `<button class="lang-btn ${lang}${empty?' empty':''}" data-key="${g.key}" data-lang="${lang}"${empty?' disabled':''}>${LANG_LABEL[lang]}</button>`;
    }).join('');
    return `<div class="phrase-group">
      <div class="group-header">${g.label}</div>
      <div class="lang-btns">${btns}</div>
    </div>`;
  }).join('');

  el.querySelectorAll('.lang-btn:not(.empty)').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = data.phrases[btn.dataset.key + '_' + btn.dataset.lang] || '';
      copyText(text, btn);
    });
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 800);
}

renderFolders();
renderContent();
</script>
</body>
